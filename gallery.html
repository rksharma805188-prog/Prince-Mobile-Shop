<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prince Mobile Gallery</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

/* Header */

header{
background:#111;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

/* Gallery Grid */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:transform 0.3s, box-shadow 0.3s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:40px;
color:white;
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Prince Mobile Gallery
</header>

<section class="gallery">

<img src="C:\Users\hp\OneDrive\Desktop\Prince Mobile\Image 1.jpg" onclick="openImage(this)">
<img src="C:\Users\hp\OneDrive\Desktop\Prince Mobile\Image 2.jpg" onclick="openImage(this)">
<img src="C:\Users\hp\OneDrive\Desktop\Prince Mobile\image 3.jpeg" onclick="openImage(this)">
<img src="C:\Users\hp\OneDrive\Desktop\Prince Mobile\image 4.jpeg" onclick="openImage(this)">
<img src="C:\Users\hp\OneDrive\Desktop\Prince Mobile\image 5.jpeg" onclick="openImage(this)">
<img src="C:\Users\hp\OneDrive\Desktop\Prince Mobile\image 6.jpeg" onclick="openImage(this)">

</section>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

<span class="close" onclick="closeImage()">×</span>

<img id="lightbox-img">

</div>

<script>

function openImage(img){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=img.src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

</script>
<footer>

© 2026 Prince Mobile | All Rights Reserved

</footer>

</body>
</html>
